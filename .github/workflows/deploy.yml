name: Deploy Vite
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - setup-node:
          node-version: 20
      - run: |
          cd client
          npm install
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist
      - uses: actions/deploy-pages@v4
