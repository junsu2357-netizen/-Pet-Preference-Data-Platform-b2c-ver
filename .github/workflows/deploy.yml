name: Deploy Vite
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          if [ -d "client" ]; then
            cd client
            npm install --legacy-peer-deps
            npm run build
          else
            npm install --legacy-peer-deps
            npm run build
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # dist, build 폴더 중 있는 놈을 가져가도록 설정
          path: |
            client/dist
            client/build
            dist
            build
      - uses: actions/deploy-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: |
            client/dist
            dist
      - uses: actions/deploy-pages@v4
